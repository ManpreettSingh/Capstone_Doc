<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Multi-Modal ASD Detection | CPG 52 | TIET</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --white:#FFFFFF;
  --off:#F6F5F2;
  --off2:#EEECEA;
  --border:#DDDBD5;
  --navy:#0D1B35;
  --red:#C0191A;
  --teal:#0C6B59;
  --slate:#4A5568;
  --text1:#0D1B35;
  --text2:#4A5568;
  --text3:#8A95A5;
  --sh:0 1px 3px rgba(13,27,53,.05),0 4px 18px rgba(13,27,53,.07);
  --sh-lg:0 8px 36px rgba(13,27,53,.11);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--white);color:var(--text1);font-family:'Raleway',sans-serif}
#root{width:100%;height:100%}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── LAYOUT ── */
.shell{display:flex;width:100vw;height:100vh}

/* ── RAIL ── */
.rail{width:64px;min-width:64px;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;background:var(--white);border-right:1px solid var(--border);z-index:10;position:relative;flex-shrink:0}
.dot{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--border);cursor:pointer;transition:all .3s;position:relative}
.dot::after{content:attr(data-tip);position:absolute;left:calc(100% + 12px);top:50%;transform:translateY(-50%);background:var(--navy);color:#fff;font-size:11px;font-family:'Raleway',sans-serif;white-space:nowrap;padding:4px 10px;border-radius:5px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:200}
.dot:hover::after{opacity:1}
.dot.active{background:var(--red);border-color:var(--red);transform:scale(1.35)}
.dot:hover:not(.active){border-color:var(--slate)}
.rail-num{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:1.5px;margin-top:18px}

/* ── PROGRESS ── */
.prog{position:fixed;top:0;left:64px;right:0;height:2px;background:var(--border);z-index:20}
.prog-fill{height:100%;background:var(--red);transition:width .5s cubic-bezier(.4,0,.2,1)}

/* ── MAIN ── */
.main{flex:1;height:100vh;overflow:hidden}
.sw{width:100%;height:100vh;overflow-y:auto;overflow-x:hidden;padding:44px 58px 76px;display:flex;flex-direction:column;justify-content:center}

/* ── ANIMATION ── */
.si{animation:si .48s cubic-bezier(.22,1,.36,1) both}
@keyframes si{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* ── TYPE ── */
.tag{font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--red);margin-bottom:9px}
.h1{font-family:'Source Serif 4',serif;font-weight:700;font-size:clamp(24px,2.6vw,34px);color:var(--navy);line-height:1.2;margin-bottom:7px;font-style:normal}
.h1 em{color:var(--red);font-style:normal}
.rule{width:40px;height:2.5px;background:var(--red);border-radius:2px;margin-bottom:26px}
p,.sm{font-size:14px;color:var(--text2);line-height:1.72;font-family:'Raleway',sans-serif}
.sm{font-size:13px}
.lbl{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--text3);margin-bottom:9px}

/* ── CARDS ── */
.card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:20px;box-shadow:var(--sh)}
.card-off{background:var(--off);border:1px solid var(--border);border-radius:10px;padding:20px}
.card-dk{background:var(--navy);border-radius:10px;padding:20px;color:#fff}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}

/* ── TABLE ── */
table{width:100%;border-collapse:collapse;font-size:13px;font-family:'Raleway',sans-serif}
th{text-align:left;padding:8px 12px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);border-bottom:1.5px solid var(--border);background:var(--off)}
td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text2)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--off)}
.price{font-family:'Raleway',sans-serif;font-weight:700;color:var(--navy);font-size:14px}

/* ── BARS ── */
.mtrack{height:7px;background:var(--off2);border-radius:3px;overflow:hidden;margin-top:6px}
.mfill{height:100%;border-radius:3px;animation:bg 1.2s cubic-bezier(.4,0,.2,1) both}
@keyframes bg{from{clip-path:inset(0 100% 0 0)}to{clip-path:inset(0 0 0 0)}}

/* ── GANTT ── */
.gr{display:grid;grid-template-columns:122px 1fr;align-items:center;gap:10px;margin-bottom:6px}
.gtrack{height:22px;background:var(--off2);border-radius:4px;position:relative;overflow:hidden}
.gbar{height:100%;border-radius:4px;position:absolute;display:flex;align-items:center;padding:0 8px;font-size:10px;font-weight:600;color:#fff;animation:bg 1s ease-out both}
/* current progress marker */
.gnow{position:absolute;top:0;bottom:0;width:1.5px;background:var(--red);z-index:10;opacity:.7}

/* ── NAV ── */
.arrows{position:fixed;bottom:24px;right:30px;display:flex;gap:9px;z-index:20}
.arr{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--border);background:var(--white);color:var(--text2);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--sh);transition:all .2s;font-family:sans-serif}
.arr:hover{border-color:var(--navy);color:var(--navy);box-shadow:var(--sh-lg)}
.arr:disabled{opacity:.3;cursor:not-allowed}

/* ── TEAM CARD ── */
.tc{background:var(--white);border:1px solid var(--border);border-radius:9px;padding:15px 17px;display:flex;gap:12px;align-items:flex-start;transition:all .22s}
.tc:hover{box-shadow:var(--sh-lg);border-color:var(--navy);transform:translateY(-2px)}
.av{width:34px;height:34px;border-radius:7px;background:var(--navy);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700;font-size:12px;color:#fff;letter-spacing:.5px}

/* ── REF ── */
.rl{padding:8px 0;border-bottom:1px solid var(--border);display:flex;gap:11px;align-items:baseline}
.rn{font-weight:700;font-size:11px;color:var(--red);flex-shrink:0;width:22px}

/* THAPAR LOGO SVG inline */
.tiet-logo svg{display:block}

@media(max-width:768px){
  .rail{width:44px;min-width:44px}
  .sw{padding:22px 18px 76px}
  .g2,.g3,.g4{grid-template-columns:1fr}
  .prog{left:44px}
  .gr{grid-template-columns:90px 1fr}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ─── DATA ───────────────────────────────────────────────
const SLIDES=[
  {id:1,label:"Title"},      {id:2,label:"Need"},
  {id:3,label:"Modalities"}, {id:4,label:"Literature"},
  {id:5,label:"Objectives"}, {id:6,label:"Methodology"},
  {id:7,label:"Hardware"},   {id:8,label:"Software"},
  {id:9,label:"Metrics"},    {id:10,label:"Work Plan"},
  {id:11,label:"Team"},
];

const TEAM=[
  {name:"Arul Goyal",     roll:"102303741",role:"QML & ML Lead",       task:"Fast-Quantum algorithms for EEG analysis"},
  {name:"Diya",           roll:"102303733",role:"Machine Learning",     task:"Feature extraction & multi-modal fusion"},
  {name:"Krit Mukul",     roll:"102303213",role:"Hardware & CV",        task:"IR camera setup & gaze-tracking model"},
  {name:"Manpreet Singh", roll:"102303216",role:"Hardware Integration", task:"EEG headset interface & gait sensor setup"},
  {name:"Lakshay Rana",   roll:"102483040",role:"Data & Documentation", task:"Dataset preprocessing & literature survey"},

const HW=[
  {item:"NeuroSky MindWave Mobile 2", spec:"Single-channel EEG, Bluetooth 3.0",  avail:"Amazon India",            price:"₹8,500"},
  {item:"Logitech C920 + IR LEDs ×10",spec:"1080p 30fps + IR illumination ring", avail:"Flipkart / College Lab",  price:"₹5,200"},
  {item:"MPU-6050 IMU Module",         spec:"6-axis accel + gyro, I²C",           avail:"Robocraze / Local",       price:"₹150"},
  {item:"Arduino Nano + HC-05 BLE",    spec:"ATmega328P + Bluetooth wireless",    avail:"Amazon / Robocraze",      price:"₹650"},
  {item:"Raspberry Pi 4 (4 GB)",       spec:"Edge compute node — Python ML stack",avail:"Evelta / RoboElectronics",price:"₹7,500"},
  {item:"Cables, Mounts & Misc.",      spec:"Wiring, enclosures, IR filters",     avail:"Local hardware store",    price:"₹1,200"},
];

// Timeline Jan–Dec 2026 (100 = Dec end)
// Current progress mark ≈ 21% (mid-March ≈ 2.5 months into year)
const GANTT=[
  {label:"Setup & Data",  start:0,  dur:23, col:"#0D1B35", done:true},   // Jan–Mar (nearly done)
  {label:"Preprocessing", start:16, dur:22, col:"#0C6B59", done:false},  // Feb–Apr
  {label:"QML Training",  start:34, dur:22, col:"#C0191A", done:false},  // May–Jul
  {label:"Fusion Model",  start:52, dur:20, col:"#6D28D9", done:false},  // Jul–Sep
  {label:"Testing",       start:68, dur:16, col:"#D97706", done:false},  // Sep–Oct
  {label:"Report & Demo", start:83, dur:17, col:"#374151", done:false},  // Nov–Dec
];
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

const REFS=[
  "ABIDE I — Martino et al. (2013). Autism Brain Imaging Data Exchange. <em>Molecular Psychiatry</em>.",
  "ABIDE II — Di Martino et al. (2017). Enhanced dataset, 19 sites. <em>Molecular Autism</em>.",
  "OpenNeuro — Gorgolewski et al. (2017). BIDS-formatted neuroimaging platform.",
  "QML for EEG — Mari et al. (2022). Quantum ML benchmarks. <em>PennyLane Technical Report</em>.",
  "Gait & ASD — Suh et al. (2018). 95% kinematic classification. <em>Autism Research</em>.",
  "Eye-Tracking — Klin & Jones (2002, 2013). Gaze biomarkers in ASD. <em>Nature</em>.",
];

// ─── THAPAR LOGO ────────────────────────────────────────
const TIET_LOGO = `
<svg width="56" height="56" viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg" style="border-radius:10px;display:block;flex-shrink:0">
  <rect width="56" height="56" rx="10" fill="#C0191A"/>
  <!-- t character -->
  <rect x="10" y="14" width="16" height="3.5" rx="1.5" fill="white"/>
  <rect x="16" y="14" width="3.5" height="22" rx="1.5" fill="white"/>
  <!-- i stem -->
  <rect x="33" y="22" width="3.5" height="14" rx="1.5" fill="white"/>
  <!-- i dot (circle) -->
  <circle cx="34.75" cy="17" r="3" fill="white"/>
</svg>`;

// ─── HELPERS ────────────────────────────────────────────
function mk(tag,cls,html){
  const e=document.createElement(tag);
  if(cls)e.className=cls;
  if(html!==undefined)e.innerHTML=html;
  return e;
}
function div(cls,html){return mk('div',cls,html)}
function dot(n,color){return `<span style="width:7px;height:7px;border-radius:50%;background:${color};display:inline-block;flex-shrink:0;margin-top:5px"></span>`}

// ─── SLIDE BUILDERS ──────────────────────────────────────

function S1(){
  const r=div('si');
  r.innerHTML=`
    <!-- Full-height centered layout -->
    <div style="min-height:76vh;display:flex;flex-direction:column;justify-content:center">

      <!-- Institute header row -->
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:48px;padding-bottom:22px;border-bottom:1px solid var(--border)">
        <div class="tiet-logo">${TIET_LOGO}</div>
        <div>
          <div style="font-size:11px;font-weight:700;letter-spacing:2.5px;color:var(--red);text-transform:uppercase">Thapar Institute of Engineering &amp; Technology</div>

        </div>

        </div>

            </div>`).join('')}
        </div>

}

function S2(){
  const r=div('si');
  r.innerHTML=`
  <div class="tag">02 / Need Analysis</div>
  <h1 class="h1">Why Does This Problem <em>Matter?</em></h1>
  <div class="rule"></div>
  <div class="g2" style="margin-bottom:16px">
    <div class="card" style="border-left:3px solid var(--red)">
      <div class="lbl">The Diagnostic Gap</div>

  </div>
  <div class="card-dk" style="display:flex;gap:28px;align-items:center">
    <div style="flex:1">
      <div style="font-size:10px;letter-spacing:2.5px;font-weight:600;color:rgba(255,255,255,.4);margin-bottom:8px">OUR SOLUTION</div>

  const r=div('si');

      </div>`).join('')}
  </div>
  <!-- Pipeline SVG -->
  <div style="background:var(--off);border:1px solid var(--border);border-radius:10px;padding:16px 20px">
    <div class="lbl" style="margin-bottom:12px">Fusion Pipeline</div>
    <svg viewBox="0 0 860 54" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block;overflow:visible">

      <text x="511" y="27" text-anchor="middle" font-family="Raleway,sans-serif" font-size="12" font-weight="600" fill="#5B21B6">Feature</text>
      <text x="511" y="41" text-anchor="middle" font-family="Raleway,sans-serif" font-size="11" fill="#6D28D9">Extraction</text>
      <line x1="588" y1="27" x2="612" y2="27" stroke="#A0AEC0" stroke-width="1.5" marker-end="url(#a)"/>
      <rect x="620" y="9" width="118" height="36" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1.5"/>
      <text x="679" y="27" text-anchor="middle" font-family="Raleway,sans-serif" font-size="12" font-weight="600" fill="#C0191A">QML Fusion</text>
      <text x="679" y="41" text-anchor="middle" font-family="Raleway,sans-serif" font-size="11" fill="#C0191A">Model</text>
      <line x1="746" y1="27" x2="768" y2="27" stroke="#A0AEC0" stroke-width="1.5" marker-end="url(#a)"/>
      <rect x="776" y="4" width="84" height="46" rx="6" fill="#0D1B35"/>
      <text x="818" y="25" text-anchor="middle" font-family="Raleway,sans-serif" font-size="11" font-weight="700" fill="#fff">ASD</text>
      <text x="818" y="40" text-anchor="middle" font-family="Raleway,sans-serif" font-size="10" fill="rgba(255,255,255,.6)">Score</text>
    </svg>
  </div>`;
  return r;

  const main=mk('div','main');
  const sw=mk('div','sw');
  sw.appendChild(FNS[cur]());
  main.appendChild(sw);

  // Arrows
  const arrows=mk('div','arrows');
  const prev=document.createElement('button');
  prev.className='arr';prev.innerHTML='&#8592;';prev.disabled=cur===0;
  prev.addEventListener('click',()=>go(cur-1));
  const next=document.createElement('button');
  next.className='arr';next.innerHTML='&#8594;';next.disabled=cur===SLIDES.length-1;
  next.addEventListener('click',()=>go(cur+1));
  arrows.append(prev,next);

  shell.append(rail,main);
  app.append(pb,shell,arrows);
}

function go(i){if(i<0||i>=SLIDES.length)return;cur=i;render();}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown')go(cur+1);
  if(e.key==='ArrowLeft' ||e.key==='ArrowUp')  go(cur-1);
});

render();
</script>
</body>
</html>
